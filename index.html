<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geheime Opdracht</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#6C63FF,#3F3D56);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    color:#3F3D56;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#6C63FF;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#534ad6;
}
</style>

</head>
<body>

<div class="container">

<h1>🎭 Geheime Opdracht</h1>

<p>Vul de namen van de spelers in.</p>

<input id="naam1" placeholder="Speler 1">
<input id="naam2" placeholder="Speler 2">
<input id="naam3" placeholder="Speler 3">
<input id="naam4" placeholder="Speler 4">
<input id="naam5" placeholder="Speler 5">
<input id="naam6" placeholder="Speler 6">

<button>Start Spel</button>

</div>

</body>
</html>
